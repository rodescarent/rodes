<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RODES | Opinión del cliente</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
    }

    .content-container {
      max-width: 600px;
      margin: auto;
      padding: 30px 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 25px;
      border-radius: 14px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #ccc;
    }

    label {
      display: block;
      margin-top: 18px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #d4af37;
      color: #111;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .mensaje {
      margin-top: 18px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body class="page-review">

  <div class="topbar-wrap">
    <nav class="topbar container" aria-label="Navegación principal">
      <a class="brand" href="index.html" aria-label="RODES Car Rental - Inicio">
        <span class="brand__name">RODES</span>
        <span class="brand__tag">CAR RENTAL</span>
      </a>

      <button class="menu-toggle" type="button" aria-label="Abrir menú"
        aria-expanded="false" aria-controls="main-menu">
        <span></span><span></span><span></span>
      </button>

      <div class="topbar__links" id="main-menu">
        <a class="nav-link" href="index.html">Inicio</a>
        <a class="nav-link" href="autos.html">Nuestros autos</a>
        <a class="nav-link" href="articulos.html">Extras</a>
        <a class="nav-link" href="contacto.html">Contacto</a>
      </div>

      <a class="reserve-button" href="q5progressive.html">
        <span class="reserve-button__icon" aria-hidden="true">▣</span>
        Reservar ahora
      </a>
    </nav>
  </div>

  <div class="content-container">
    <div class="card">
      <h1>Déjanos tu opinión</h1>
      <p>Gracias por confiar en RODES Car Rental.</p>

      <form id="opinionForm">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="estrellas">Clasificación</label>
        <select id="estrellas" name="estrellas" required>
          <option value="">Selecciona una opción</option>
          <option value="5">★★★★★ - Excelente</option>
          <option value="4">★★★★☆ - Muy bueno</option>
          <option value="3">★★★☆☆ - Bueno</option>
          <option value="2">★★☆☆☆ - Regular</option>
          <option value="1">★☆☆☆☆ - Malo</option>
        </select>

        <label for="comentario">Comentario</label>
        <textarea id="comentario" name="comentario" required></textarea>

        <button type="submit">Enviar opinión</button>

        <div id="mensaje" class="mensaje"></div>
      </form>
    </div>
  </div>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzaRWrQtfdDe8-V--rGcAY565760tZkUVtWDtcL3EGOJmen3dLfiKLiTdIXqz7pVLxruQ/exec";

    document.getElementById("opinionForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const mensaje = document.getElementById("mensaje");
      mensaje.textContent = "Enviando opinión...";

      const datos = {
        nombre: document.getElementById("nombre").value.trim(),
        estrellas: document.getElementById("estrellas").value,
        comentario: document.getElementById("comentario").value.trim()
      };

      try {
        const respuesta = await fetch(WEBAPP_URL, {
          method: "POST",
          body: JSON.stringify(datos)
        });

        const resultado = await respuesta.json();

        if (resultado.ok) {
          mensaje.textContent = "Gracias. Tu opinión fue enviada correctamente.";
          document.getElementById("opinionForm").reset();
        } else {
          mensaje.textContent = "No se pudo enviar la opinión.";
        }
      } catch (error) {
        mensaje.textContent = "Error de conexión. Intenta nuevamente.";
      }
    });
  </script>

  <script>
    const menuToggle = document.querySelector(".menu-toggle");
    const mainMenu = document.querySelector("#main-menu");

    if (menuToggle && mainMenu) {
      menuToggle.addEventListener("click", () => {
        const isOpen = menuToggle.getAttribute("aria-expanded") === "true";
        menuToggle.setAttribute("aria-expanded", String(!isOpen));
        mainMenu.classList.toggle("is-open");
        document.body.classList.toggle("menu-open");
      });

      mainMenu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          menuToggle.setAttribute("aria-expanded", "false");
          mainMenu.classList.remove("is-open");
          document.body.classList.remove("menu-open");
        });
      });
    }
  </script>

</body>
</html>
