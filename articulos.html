<!DOCTYPE html>
<html lang="EN">
<head>
  <link rel="stylesheet" href="styles.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>RODES|articles</title>

  <style>
    .item-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .item-modal[aria-hidden="false"] {
      display: flex;
    }

    .item-modal__box {
      position: relative;
      background: #fff;
      color: #111;
      max-width: 980px;
      width: 100%;
      max-height: 92vh;
      overflow: auto;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .item-modal__img {
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 12px;
      display: block;
    }

    .item-modal__close {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: #fff;
      color: #111;
      font-size: 34px;
      line-height: 38px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
      z-index: 2;
    }

    .item-modal__price {
      font-weight: bold;
      font-size: 20px;
      margin-top: 8px;
    }
  </style>
</head>

<body class="page-items">

  <header class="hero hero--items">
    <div class="hero__content container">
      <h1 class="hero__title">Travel equipment</h1>
      <p class="hero__subtitle"></p>
      <nav class="hero__quicklinks" aria-label="Accesos rápidos"></nav>
    </div>
  </header>

  <main class="main">
    <section class="section container">
      <div class="card card--items">
        <div class="card__head">
          <div>
            <h2 class="card__title"></h2>
          </div>
        </div>

        <form id="finalForm" class="items-form">
          <input type="hidden" name="action" value="finalize_items">
          <input type="hidden" name="row_index" id="row_index">
          <input type="hidden" name="email" id="email">
          <input type="hidden" name="items_ids" id="items_ids">
          <input type="hidden" name="items_total" id="items_total">

          <div class="items-grid" id="grid"></div>

          <div class="items-bar">
            <div class="items-bar__col">
              <div class="small"></div>
              <div style="display:none;">
                <div id="idsText" class="value-strong">..</div>
              </div>
            </div>

            <div class="items-bar__col">
              <div class="small small--spaced">Desglose de pago</div>

              <div class="pay-breakdown" aria-label="Desglose de pago">
                <div class="pay-row"><span>Total price of items: </span><strong id="itemsOnlyLine">CA$ 0.00</strong></div>
                <div class="pay-row"><span>Total car rental price: </span><strong id="autoLine">CA$ 0.00</strong></div>
                <div class="pay-row"><span>Total insurance price (CA$ 15 × day): </span><strong id="insLine">CA$ 0.00</strong></div>
                <div class="pay-row"><span>Deposit: </span><strong id="depLine">CA$ 300.00</strong></div>
                <div class="pay-row pay-row--total"><span>Total: </span><strong id="paySum">CA$ 0.00</strong></div>
              </div>
            </div>

            <button class="btn btn-primary" id="payBtn" type="submit">Pay</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div class="item-modal" id="itemModal" aria-hidden="true">
    <div class="item-modal__box">
      <button class="item-modal__close" type="button" id="closeModal">×</button>
      <img id="modalImg" class="item-modal__img" src="" alt="">
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>
      <div id="modalPrice" class="item-modal__price"></div>
    </div>
  </div>

<script>
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzNAOMuQdxhjkdh4Ff4pF_NeZgHYDmSKaTaXtpFd1PCLk_am0hQu4I2eVqJUjy8LwG6/exec";

  const ITEMS = [
    {
      id:"item01",
      name:"",
      price:15,
      img:"images/articulos/cocheacientobebe.jpg",
      detailImg:"images/articulos/cocheacientobebe2.png",
      desc:""
    },
    {
      id:"item02",
      name:"Bike rack",
      price:25,
      img:"images/articulos/2en1portaequipaje.jpg",
      detailImg:"images/articulos/2en1portaequipaje2.png",
      desc:"Perfect for carrying bikes safely during your trip."
    },
    {
      id:"item03",
      name:"Cargo carrier",
      price:10,
      img:"img/cargo-carrier-thumb.jpg",
      detailImg:"img/cargo-carrier-promo.jpg",
      desc:"Extra space for luggage, bags and travel equipment."
    },
    {
      id:"item04",
      name:"Child seat",
      price:30,
      img:"img/child-seat-thumb.jpg",
      detailImg:"img/child-seat-promo.jpg",
      desc:"Safe and comfortable child seat for family travel."
    },
    {
      id:"item05",
      name:"Camping set",
      price:18,
      img:"img/camping-thumb.jpg",
      detailImg:"img/camping-promo.jpg",
      desc:"Useful equipment for outdoor adventures."
    },
    {
      id:"item06",
      name:"Cooler",
      price:12,
      img:"img/cooler-thumb.jpg",
      detailImg:"img/cooler-promo.jpg",
      desc:"Keep drinks and food fresh during your trip."
    },
  ];

  function must(key){ return (localStorage.getItem(key) || "").trim(); }

  const row_index  = must("row_index");
  const email      = must("email");
  const diasTxt    = must("dias");
  const diasNum    = Math.max(0, parseInt(diasTxt || "0", 10) || 0);
  const auto_total = Number(must("auto_total") || 0);

  const DEPOSIT = 300;
  const INSURANCE_PER_DAY = 15;

  document.getElementById("row_index").value = row_index;
  document.getElementById("email").value = email;

  const grid = document.getElementById("grid");

  ITEMS.forEach(it => {
    const card = document.createElement("div");
    card.className = "item-card";
    card.innerHTML = `
      <label class="item-row">
        <input class="item-check" type="checkbox" data-id="${it.id}" data-price="${it.price}">

        <div class="item-photo-wrap">
          <img class="item-photo" src="${it.img}" alt="${it.name}">
        </div>

        <div class="item-info">
          <div class="name">${it.name}</div>
          <div class="small">ID: ${it.id}</div>
          <div class="price">CA$ ${Number(it.price).toFixed(2)}</div>
          <button class="item-details-btn" type="button" data-id="${it.id}">View details</button>
        </div>
      </label>
    `;
    grid.appendChild(card);
  });

  const modal = document.getElementById("itemModal");
  const modalImg = document.getElementById("modalImg");
  const modalTitle = document.getElementById("modalTitle");
  const modalDesc = document.getElementById("modalDesc");
  const modalPrice = document.getElementById("modalPrice");

  function openModal(item) {
    modalImg.src = item.detailImg;
    modalImg.alt = item.name || "Item details";
    modalTitle.textContent = item.name || "";
    modalDesc.textContent = item.desc || "";
    modalPrice.textContent = "CA$ " + Number(item.price).toFixed(2);

    modal.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    modal.setAttribute("aria-hidden", "true");
    modalImg.src = "";
    document.body.style.overflow = "";
  }

  grid.addEventListener("click", (e) => {
    const btn = e.target.closest(".item-details-btn");
    if (!btn) return;

    e.preventDefault();

    const item = ITEMS.find(x => x.id === btn.dataset.id);
    if (!item) return;

    openModal(item);
  });

  document.getElementById("closeModal").addEventListener("click", closeModal);

  modal.addEventListener("click", (e) => {
    if (e.target === modal) closeModal();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && modal.getAttribute("aria-hidden") === "false") {
      closeModal();
    }
  });

  function recompute(){
    const checks = [...document.querySelectorAll('#grid input[type="checkbox"][data-id]')];

    const ids = checks.filter(c => c.checked).map(c => c.dataset.id);

    const itemsOnly = checks
      .filter(c => c.checked)
      .reduce((a,c) => a + Number(c.dataset.price || 0), 0);

    const insuranceTotal = diasNum * INSURANCE_PER_DAY;
    const extrasTotalForStripe = itemsOnly + insuranceTotal + DEPOSIT;

    document.getElementById("items_ids").value = ids.join(",");
    document.getElementById("items_total").value = extrasTotalForStripe.toFixed(2);

    document.getElementById("idsText").textContent = ids.length ? ids.join(",") : "—";

    document.getElementById("itemsOnlyLine").textContent = "CA$ " + itemsOnly.toFixed(2);
    document.getElementById("autoLine").textContent      = "CA$ " + auto_total.toFixed(2);
    document.getElementById("insLine").textContent       = "CA$ " + insuranceTotal.toFixed(2);
    document.getElementById("depLine").textContent       = "CA$ " + Number(DEPOSIT).toFixed(2);

    const grandTotal = auto_total + extrasTotalForStripe;
    document.getElementById("paySum").textContent = "CA$ " + grandTotal.toFixed(2);

    localStorage.setItem("items_ids", ids.join(","));
    localStorage.setItem("items_total_only", itemsOnly.toFixed(2));
    localStorage.setItem("insurance_total", insuranceTotal.toFixed(2));
    localStorage.setItem("deposit", String(DEPOSIT));
    localStorage.setItem("grand_total", grandTotal.toFixed(2));
  }

  grid.addEventListener("change", recompute);
  recompute();

  document.getElementById("finalForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    if (!row_index || !email) {
      alert("Reservation details are missing. Return to homepage.");
      return;
    }

    const btn = document.getElementById("payBtn");
    btn.disabled = true;
    const oldText = btn.textContent;
    btn.textContent = "Opening Stripe…";

    try {
      const fd = new FormData(e.target);
      const resp = await fetch(WEBAPP_URL, { method: "POST", body: fd });

      const text = await resp.text();
      let data;
      try { data = JSON.parse(text); }
      catch { throw new Error("Answer no-JSON from server: " + text.slice(0, 200)); }

      if (!data.ok) throw new Error(data.error || "Unknown error");
      if (!data.stripe_url) throw new Error("stripe_url was not included in the response.");

      window.location.href = data.stripe_url;

    } catch (err) {
      alert(String(err));
      btn.disabled = false;
      btn.textContent = oldText;
    }
  });
</script>

</body>
</html>
