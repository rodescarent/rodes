<!DOCTYPE html>
<html lang="EN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>RODES|Audi Q5 Progressive Sline</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="page-car">

  <header class="hero hero--car">
    <div class="hero__content container">
      <h1 class="hero__title">Audi Q5 Progressive Sline</h1>

      <nav class="hero__quicklinks" aria-label="Quick links">
        <a class="glass-btn" href="index.html">Home</a>
        <a class="glass-btn" href="detallesq5progressive.html">Details</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="section container">
      <div class="card card--form">
        <div class="card__head">
          <div>
            <h2 class="card__title">Car rental form</h2>
          </div>
        </div>

        <form id="reservaForm" class="form">
          <div class="field">
            <label for="nombre">Name and surname</label>
            <input type="text" id="nombre" required placeholder="Name">
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="name@email.com">
          </div>

          <div class="field">
            <label for="telefono">Phone</label>
            <input type="tel" id="telefono" required
              placeholder="Ex: 6471234567 or +16471234567" autocomplete="tel">
          </div>

          <div class="field field--full">
            <label for="pickup_address">Pickup address</label>
            <input type="text" id="pickup_address" required
              placeholder="Ex: 123 Queen St W, Toronto, ON (or YYZ / YTZ)">
          </div>

          <div class="field field--full">
            <button type="button" id="btnVerifyPickupMap" class="btn btn-ghost btn-block">
              Check address on Google Maps
            </button>
          </div>

          <div id="pickupAirportBox" class="airport-box">
            <div class="airport-box__title">Airport details (pickup)</div>
            <div class="grid-2">
              <div class="field">
                <label for="pickup_terminal">Terminal</label>
                <input id="pickup_terminal" type="text" placeholder="Ex: T1 / T3">
              </div>
              <div class="field">
                <label for="pickup_gate">Gate</label>
                <input id="pickup_gate" type="text" placeholder="Ex: D12">
              </div>
            </div>
          </div>

          <div class="field field--full checkline">
            <input type="checkbox" id="dropoffDifferent">
            <label for="dropoffDifferent">The return address is different</label>
          </div>

          <div id="dropoffBox" class="dropoff-box">
            <div class="field field--full">
              <label for="dropoff_address">Dropoff address</label>
              <input type="text" id="dropoff_address"
                placeholder="Ex: 200 Bay St, Toronto, ON (or YYZ / YTZ)">
            </div>

            <div class="field field--full">
              <button type="button" id="btnVerifyDropoffMap" class="btn btn-ghost btn-block">
                Check address on Google Maps
              </button>
            </div>

            <div id="dropoffAirportBox" class="airport-box">
              <div class="airport-box__title">Airport details (dropoff)</div>
              <div class="grid-2">
                <div class="field">
                  <label for="dropoff_terminal">Terminal</label>
                  <input id="dropoff_terminal" type="text" placeholder="Ex: T1 / T3">
                </div>
                <div class="field">
                  <label for="dropoff_gate">Gate</label>
                  <input id="dropoff_gate" type="text" placeholder="Ex: D12">
                </div>
              </div>
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label for="fechaInicio">Start date</label>
              <input type="date" id="fechaInicio" required>
            </div>
            <div class="field">
              <label for="horaInicio">Start time</label>
              <input type="time" id="horaInicio" required>
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label for="fechaFin">End date</label>
              <input type="date" id="fechaFin" required>
            </div>
            <div class="field">
              <label for="horaFin">End time</label>
              <input type="time" id="horaFin" required>
            </div>
          </div>

          <p id="availabilityMsg" class="availability"></p>

          <div id="calendarBox" class="calendar">
            <div class="calendar__hint">Availability (shaded busy days)</div>
            <iframe id="calendarIframe"
              src="https://calendar.google.com/calendar/embed?src=a131346a7e1a176d2af7567823a3ae415030eaf33d8947a154d88289a33d8150%40group.calendar.google.com&ctz=UTC"
              frameborder="0" scrolling="no"></iframe>
          </div>

          <p id="resultadoPrecio" class="pricebox"></p>

          <button id="btnContinue" type="submit" class="btn btn-primary btn-block" disabled
            title="Complete the required information and select available dates and times">
            Continue
          </button>
        </form>
      </div>
    </section>
  </main>

<script>
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzNAOMuQdxhjkdh4Ff4pF_NeZgHYDmSKaTaXtpFd1PCLk_am0hQu4I2eVqJUjy8LwG6/exec";

  const PRECIO_SEMANA = 100;
  const PRECIO_FINDE  = 135;

  function normalizePhone(raw) {
    const s = (raw || "").trim();
    if (!s) return "";
    const digits = s.replace(/\D/g, "");
    if (digits.length === 10) return "+1" + digits;
    if (digits.length === 11 && digits.startsWith("1")) return "+" + digits;
    if (s.startsWith("+") && digits.length >= 11) return "+" + digits;
    return "";
  }

  const form = document.getElementById("reservaForm");
  const nombreEl = document.getElementById("nombre");
  const emailEl = document.getElementById("email");
  const telefonoEl = document.getElementById("telefono");
  const pickupEl = document.getElementById("pickup_address");
  const btnVerifyPickup = document.getElementById("btnVerifyPickupMap");
  const dropoffDifferentEl = document.getElementById("dropoffDifferent");
  const dropoffBox = document.getElementById("dropoffBox");
  const dropoffEl = document.getElementById("dropoff_address");
  const btnVerifyDropoff = document.getElementById("btnVerifyDropoffMap");
  const pickupAirportBox = document.getElementById("pickupAirportBox");
  const pickupTerminalEl = document.getElementById("pickup_terminal");
  const pickupGateEl = document.getElementById("pickup_gate");
  const dropoffAirportBox = document.getElementById("dropoffAirportBox");
  const dropoffTerminalEl = document.getElementById("dropoff_terminal");
  const dropoffGateEl = document.getElementById("dropoff_gate");
  const fiEl = document.getElementById("fechaInicio");
  const hiEl = document.getElementById("horaInicio");
  const ffEl = document.getElementById("fechaFin");
  const hfEl = document.getElementById("horaFin");
  const availabilityMsg = document.getElementById("availabilityMsg");
  const calendarBox = document.getElementById("calendarBox");
  const outEl = document.getElementById("resultadoPrecio");
  const btnContinue = document.getElementById("btnContinue");

  btnVerifyPickup.addEventListener("click", () => {
    const addr = pickupEl.value.trim();
    if (!addr) {
      alert("Write the pickup address first.");
      pickupEl.focus();
      return;
    }
    window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(addr), "_blank");
  });

  btnVerifyDropoff.addEventListener("click", () => {
    const addr = dropoffEl.value.trim();
    if (!addr) {
      alert("Write the dropoff address first.");
      dropoffEl.focus();
      return;
    }
    window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(addr), "_blank");
  });

  const AIRPORT_TRIGGERS = ["6301", "pearson", "2 eireann", "airport", "yyz", "ytz"];

  function normalizeText(s) {
    return (s || "").toLowerCase().replace(/\s+/g, " ").trim();
  }

  function isAirportAddress(addr) {
    const t = normalizeText(addr);
    return AIRPORT_TRIGGERS.some(k => t.includes(k));
  }

  function updatePickupAirportUI() {
    const on = isAirportAddress(pickupEl.value);
    pickupAirportBox.style.display = on ? "block" : "none";
    if (!on) {
      pickupTerminalEl.value = "";
      pickupGateEl.value = "";
    }
  }

  function updateDropoffAirportUI() {
    if (!dropoffDifferentEl.checked) {
      dropoffAirportBox.style.display = "none";
      dropoffTerminalEl.value = "";
      dropoffGateEl.value = "";
      return;
    }
    const on = isAirportAddress(dropoffEl.value);
    dropoffAirportBox.style.display = on ? "block" : "none";
    if (!on) {
      dropoffTerminalEl.value = "";
      dropoffGateEl.value = "";
    }
  }

  pickupEl.addEventListener("input", () => {
    updatePickupAirportUI();
    updateContinueState();
  });

  dropoffEl.addEventListener("input", () => {
    updateDropoffAirportUI();
    updateContinueState();
  });

  dropoffDifferentEl.addEventListener("change", () => {
    const on = dropoffDifferentEl.checked;
    dropoffBox.style.display = on ? "block" : "none";
    dropoffEl.required = on;

    if (!on) {
      dropoffEl.value = "";
      dropoffAirportBox.style.display = "none";
      dropoffTerminalEl.value = "";
      dropoffGateEl.value = "";
    } else {
      updateDropoffAirportUI();
    }
    updateContinueState();
  });

  let BUSY_RANGES = [];

  async function loadBusyRanges() {
    try {
      const resp = await fetch(WEBAPP_URL + "?action=get_busy", { method: "GET" });
      const data = await resp.json();
      BUSY_RANGES = (data && data.ok && Array.isArray(data.ranges)) ? data.ranges : [];
    } catch (error) {
      console.warn("Could not load busy ranges:", error);
      BUSY_RANGES = [];
    }
  }

  function makeLocalDateTime(dateValue, timeValue) {
    if (!dateValue || !timeValue) return null;
    const value = new Date(`${dateValue}T${timeValue}:00`);
    return Number.isNaN(value.getTime()) ? null : value;
  }

  function rangesOverlapInclusive(start, end, busyStart, busyEnd) {
    const s = new Date(start + "T00:00:00");
    const e = new Date(end + "T00:00:00");
    const bs = new Date(busyStart + "T00:00:00");
    const be = new Date(busyEnd + "T23:59:59");
    return s <= be && e >= bs;
  }

  function validateAvailability() {
    if (!fiEl.value || !hiEl.value || !ffEl.value || !hfEl.value) {
      return { ready: false, occupied: false };
    }

    const inicio = makeLocalDateTime(fiEl.value, hiEl.value);
    const fin = makeLocalDateTime(ffEl.value, hfEl.value);

    if (!inicio || !fin) {
      return { ready: true, occupied: false, error: "Check the dates and times." };
    }

    if (fin <= inicio) {
      return {
        ready: true,
        occupied: false,
        error: "The end date and time must be later than the start."
      };
    }

    for (const r of BUSY_RANGES) {
      if (!r || !r.start || !r.end) continue;
      if (rangesOverlapInclusive(fiEl.value, ffEl.value, r.start, r.end)) {
        return { ready: true, occupied: true };
      }
    }

    return { ready: true, occupied: false };
  }

  function calc() {
    const inicio = makeLocalDateTime(fiEl.value, hiEl.value);
    const fin = makeLocalDateTime(ffEl.value, hfEl.value);
    if (!inicio || !fin || fin <= inicio) return null;

    const totalHours = (fin - inicio) / (1000 * 60 * 60);
    const dias = Math.max(1, Math.ceil(totalHours / 24));

    let autoTotal = 0;
    const cur = new Date(inicio);

    for (let i = 0; i < dias; i++) {
      const day = cur.getDay();
      autoTotal += (day === 0 || day === 6) ? PRECIO_FINDE : PRECIO_SEMANA;
      cur.setDate(cur.getDate() + 1);
    }

    return {
      dias,
      horas: Math.round(totalHours * 100) / 100,
      auto_total: autoTotal
    };
  }

  function requiredDetailsAreValid() {
    if (!nombreEl.value.trim()) return false;
    if (!emailEl.validity.valid || !emailEl.value.trim()) return false;
    if (!normalizePhone(telefonoEl.value)) return false;
    if (!pickupEl.value.trim()) return false;

    if (dropoffDifferentEl.checked && !dropoffEl.value.trim()) return false;

    if (isAirportAddress(pickupEl.value)) {
      if (!pickupTerminalEl.value.trim() || !pickupGateEl.value.trim()) return false;
    }

    if (dropoffDifferentEl.checked && isAirportAddress(dropoffEl.value)) {
      if (!dropoffTerminalEl.value.trim() || !dropoffGateEl.value.trim()) return false;
    }

    return true;
  }

  function updateContinueState() {
    const v = validateAvailability();

    if (!v.ready) {
      availabilityMsg.style.display = "none";
      calendarBox.style.display = "none";
      outEl.style.display = "none";
      outEl.textContent = "";
      btnContinue.disabled = true;
      btnContinue.title = "Select start and end dates and times";
      return;
    }

    availabilityMsg.style.display = "block";

    if (v.error) {
      availabilityMsg.textContent = v.error;
      availabilityMsg.style.color = "crimson";
      calendarBox.style.display = "none";
      outEl.style.display = "none";
      outEl.textContent = "";
      btnContinue.disabled = true;
      btnContinue.title = "Correct the dates and times";
      return;
    }

    if (v.occupied) {
      availabilityMsg.textContent = "Occupied date range";
      availabilityMsg.style.color = "crimson";
      calendarBox.style.display = "block";
      outEl.style.display = "none";
      outEl.textContent = "";
      btnContinue.disabled = true;
      btnContinue.title = "Choose an available date range";
      return;
    }

    const r = calc();
    if (!r) {
      btnContinue.disabled = true;
      return;
    }

    availabilityMsg.textContent = "Available";
    availabilityMsg.style.color = "green";
    calendarBox.style.display = "none";
    outEl.style.display = "block";
    outEl.innerHTML =
      `${r.horas} hour(s) · ${r.dias} rental day(s) — ` +
      `<strong>Total auto: CA$ ${r.auto_total}</strong>`;

    const detailsValid = requiredDetailsAreValid();
    btnContinue.disabled = !detailsValid;
    btnContinue.title = detailsValid
      ? ""
      : "Complete all required information to continue";
  }

  form.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", updateContinueState);
    input.addEventListener("change", updateContinueState);
  });

  window.addEventListener("load", async () => {
    const today = new Date();
    const todayLocal = new Date(today.getTime() - today.getTimezoneOffset() * 60000)
      .toISOString().slice(0, 10);

    fiEl.min = todayLocal;
    ffEl.min = todayLocal;

    await loadBusyRanges();
    updatePickupAirportUI();
    updateDropoffAirportUI();
    updateContinueState();
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    updateContinueState();

    if (!form.reportValidity()) return;

    const v = validateAvailability();
    if (!v.ready) return alert("Choose the dates and times.");
    if (v.occupied || v.error) {
      return alert(v.error || "The selected range is not available.");
    }

    const r = calc();
    if (!r) return alert("Check the dates and times.");

    const telNorm = normalizePhone(telefonoEl.value);
    if (!telNorm) {
      alert("Invalid phone number. Use 10 digits or +1.");
      telefonoEl.focus();
      return;
    }

    const pickupAddress = pickupEl.value.trim();
    const dropoffAddress = dropoffDifferentEl.checked ? dropoffEl.value.trim() : "";

    let pickup_terminal = "";
    let pickup_gate = "";
    if (isAirportAddress(pickupAddress)) {
      pickup_terminal = pickupTerminalEl.value.trim();
      pickup_gate = pickupGateEl.value.trim();
      if (!pickup_terminal || !pickup_gate) {
        alert("For airport pickup, write Terminal and Gate.");
        (!pickup_terminal ? pickupTerminalEl : pickupGateEl).focus();
        return;
      }
    }

    let dropoff_terminal = "";
    let dropoff_gate = "";
    if (dropoffAddress && isAirportAddress(dropoffAddress)) {
      dropoff_terminal = dropoffTerminalEl.value.trim();
      dropoff_gate = dropoffGateEl.value.trim();
      if (!dropoff_terminal || !dropoff_gate) {
        alert("For airport dropoff, write Terminal and Gate.");
        (!dropoff_terminal ? dropoffTerminalEl : dropoffGateEl).focus();
        return;
      }
    }

    btnContinue.disabled = true;
    btnContinue.textContent = "Saving...";

    try {
      const payload = new URLSearchParams();
      payload.append("action", "save_reserva");
      payload.append("nombre", nombreEl.value.trim());
      payload.append("email", emailEl.value.trim());
      payload.append("telefono", telNorm);
      payload.append("pickup_address", pickupAddress);
      payload.append("dropoff_address", dropoffAddress);
      payload.append("pickup_terminal", pickup_terminal);
      payload.append("pickup_gate", pickup_gate);
      payload.append("dropoff_terminal", dropoff_terminal);
      payload.append("dropoff_gate", dropoff_gate);
      payload.append("fechaInicio", fiEl.value);
      payload.append("horaInicio", hiEl.value);
      payload.append("fechaFin", ffEl.value);
      payload.append("horaFin", hfEl.value);
      payload.append("dias", String(r.dias));
      payload.append("horas", String(r.horas));
      payload.append("auto_total", String(r.auto_total));

      const resp = await fetch(WEBAPP_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
        body: payload.toString()
      });

      const data = await resp.json();
      if (!data.ok) throw new Error(data.error || "Error saving reservation");

      localStorage.setItem("row_index", String(data.row_index));
      localStorage.setItem("nombre", data.nombre || nombreEl.value.trim());
      localStorage.setItem("email", data.email || emailEl.value.trim());
      localStorage.setItem("telefono", data.telefono || telNorm);
      localStorage.setItem("pickup_address", pickupAddress);
      localStorage.setItem("dropoff_address", dropoffAddress);
      localStorage.setItem("pickup_terminal", pickup_terminal);
      localStorage.setItem("pickup_gate", pickup_gate);
      localStorage.setItem("dropoff_terminal", dropoff_terminal);
      localStorage.setItem("dropoff_gate", dropoff_gate);
      localStorage.setItem("fechaInicio", data.fechaInicio || fiEl.value);
      localStorage.setItem("horaInicio", data.horaInicio || hiEl.value);
      localStorage.setItem("fechaFin", data.fechaFin || ffEl.value);
      localStorage.setItem("horaFin", data.horaFin || hfEl.value);
      localStorage.setItem("dias", String(data.dias || r.dias));
      localStorage.setItem("horas", String(data.horas || r.horas));
      localStorage.setItem("auto_total", String(data.auto_total ?? r.auto_total));

      window.location.href = "articulos.html";
    } catch (error) {
      console.error(error);
      alert(error.message || "Could not save the reservation.");
      btnContinue.textContent = "Continue";
      updateContinueState();
    }
  });
</script>

</body>
</html>
