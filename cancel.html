<!doctype html>
<html lang="EN">
<head>
  <link rel="stylesheet" href="styles.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payment canceled</title>
</head>

<body class="page-cancel">

  <div class="topbar-wrap">
    <nav class="topbar container" aria-label="Main navigation">
      <a class="brand" href="index.html" aria-label="RODES Car Rental - Home">
        <span class="brand__name">RODES</span>
        <span class="brand__tag">CAR RENTAL</span>
      </a>

      <button class="menu-toggle" type="button" aria-label="Open menu"
        aria-expanded="false" aria-controls="main-menu">
        <span></span><span></span><span></span>
      </button>

      <div class="topbar__links" id="main-menu">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="autos.html">Our cars</a>
        <a class="nav-link" href="articulos.html">Extras</a>
        <a class="nav-link" href="contacto.html">Contact</a>
      </div>

      <a class="reserve-button" href="q5progressive.html">
        <span class="reserve-button__icon" aria-hidden="true">▣</span>
        Reserve now
      </a>
    </nav>
  </div>

<main class="main">
    <section class="section container">

      <div class="card card--cancel">
        <div class="cancel-head">
          <div class="cancel-icon" aria-hidden="true">❌</div>
          <div>
            
            <p class="cancel-subtitle">
              Stripe did not complete the process and no charge was generated.
            </p>
          </div>
        </div>

        <div class="cancel-actions">
          <a class="btn btn-ghost" href="index.html">return to home page</a>
        </div>

        
      </div>

    </section>
  </main>


  <script>
    const menuToggle = document.querySelector(".menu-toggle");
    const mainMenu = document.querySelector("#main-menu");

    if (menuToggle && mainMenu) {
      menuToggle.addEventListener("click", () => {
        const isOpen = menuToggle.getAttribute("aria-expanded") === "true";
        menuToggle.setAttribute("aria-expanded", String(!isOpen));
        mainMenu.classList.toggle("is-open");
        document.body.classList.toggle("menu-open");
      });

      mainMenu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          menuToggle.setAttribute("aria-expanded", "false");
          mainMenu.classList.remove("is-open");
          document.body.classList.remove("menu-open");
        });
      });
    }
  </script>

</body>
</html>
