  <script>
    const OPINIONES_URL =
      "https://script.google.com/macros/s/AKfycbzaRWrQtfdDe8-V--rGcAY565760tZkUVtWDtcL3EGOJmen3dLfiKLiTdIXqz7pVLxruQ/exec";

    function escaparHTML(valor) {
      return String(valor ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function crearOpinion(opinion, claseExtra = "") {
      const cantidad = Math.max(0, Math.min(5, Number(opinion.estrellas) || 0));
      const estrellas = "★".repeat(cantidad) + "☆".repeat(5 - cantidad);

      return `
        <article class="review ${claseExtra}">
          <div class="review__stars" aria-label="${cantidad} de 5 estrellas">
            ${estrellas}
          </div>
          <p>“${escaparHTML(opinion.comentario)}”</p>
          <span>— ${escaparHTML(opinion.nombre)}</span>
        </article>
      `;
    }

    async function cargarOpiniones() {
      const resumen = document.getElementById("listaOpiniones");

      try {
        const respuesta = await fetch(OPINIONES_URL, {
          method: "GET",
          cache: "no-store"
        });

        if (!respuesta.ok) throw new Error(`HTTP ${respuesta.status}`);

        const data = await respuesta.json();
        const opiniones = Array.isArray(data.opiniones) ? data.opiniones : [];

        if (!data.ok || opiniones.length === 0) {
          resumen.innerHTML = `
            <article class="review review--status">
              <p>Próximamente mostraremos opiniones de nuestros clientes.</p>
            </article>
          `;
          return;
        }

        resumen.innerHTML = opiniones
          .slice(0, 2)
          .map((opinion) => crearOpinion(opinion))
          .join("");
      } catch (error) {
        console.error("No se pudieron cargar las opiniones:", error);
        resumen.innerHTML = `
          <article class="review review--status">
            <p>No se pudieron cargar las opiniones.</p>
          </article>
        `;
      }
    }

    cargarOpiniones();
  </script>

  <script>
    const menuToggle = document.querySelector(".menu-toggle");
    const mainMenu = document.querySelector("#main-menu");

    if (menuToggle && mainMenu) {
      menuToggle.addEventListener("click", () => {
        const isOpen = menuToggle.getAttribute("aria-expanded") === "true";
        menuToggle.setAttribute("aria-expanded", String(!isOpen));
        mainMenu.classList.toggle("is-open");
        document.body.classList.toggle("menu-open");
      });

      mainMenu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          menuToggle.setAttribute("aria-expanded", "false");
          mainMenu.classList.remove("is-open");
          document.body.classList.remove("menu-open");
        });
      });
    }
  </script>
