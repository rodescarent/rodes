<!-- contacto.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RODES | Contacto</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      text-align: center;
    }

    h1 {
      color: #38bdf8;
      margin-top: 0;
    }

    .contact-box {
      margin-top: 25px;
      text-align: left;
      background: rgba(255,255,255,0.06);
      padding: 20px;
      border-radius: 12px;
    }

    .contact-box p {
      margin: 10px 0;
    }

    .socials {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .socials a {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      text-decoration: none;
      transition: 0.2s;
    }

    .socials a:hover {
      background: #1d4ed8;
      transform: scale(1.08);
    }

    .back {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 16px;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }

    .back:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Contacto</h1>

      <p>
        Gracias por visitar RODES. Puedes comunicarte con nosotros para reservas, preguntas o información adicional.
      </p>

      <div class="contact-box">
        <p><strong>Nombre:</strong> RODES Car Rental</p>
        <p><strong>Email:</strong> contacto@rodescarent.com</p>
        <p><strong>Teléfono:</strong> +1 000 000 0000</p>
        <p><strong>Ubicación:</strong> Toronto, Ontario, Canadá</p>
      </div>

      <h2>Síguenos en redes sociales</h2>

      <div class="socials">
        <a href="#" target="_blank" title="Facebook">f</a>
        <a href="#" target="_blank" title="Instagram">◎</a>
        <a href="#" target="_blank" title="TikTok">♪</a>
        <a href="#" target="_blank" title="WhatsApp">☏</a>
      </div>

      <a class="back" href="index.html">Volver al inicio</a>
    </div>
  </div>

</body>
</html>
